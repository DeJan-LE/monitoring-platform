server {
    listen 80;
    server_name localhost;

    # Incident App
    location /incidents {
        proxy_pass         http://incident-app:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    location /tickets {
        proxy_pass         http://incident-app:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
    }

    location /start {
        proxy_pass         http://incident-app:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
    }

    location /logout {
        proxy_pass         http://incident-app:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
    }

    location /dashboard {
        proxy_pass         http://incident-app:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
    }

    location /api {
        proxy_pass         http://incident-app:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
    }

    # Startseite (Login) → incident-app
    location = / {
        proxy_pass         http://incident-app:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
    }
   # Profil – Benutzereinstellungen und Passwort ändern
	location /profil {
        proxy_pass         http://incident-app:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
    }
    # Uptime Kuma unter /kuma erreichbar
    location /kuma {
        proxy_pass         http://uptime-kuma:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
    }
}
